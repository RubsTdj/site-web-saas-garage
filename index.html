<style>
  :root {
    --accent: #0FB89A;
    --accent-2: #FF6B35;
    --bg: #FAFAF7;
    --fg: #0E1411;
    --muted: rgba(14,20,17,.60);
    --line: rgba(14,20,17,.10);
    --card: #FFFFFF;
    --shadow: 0 1px 2px rgba(14,20,17,.04), 0 8px 32px rgba(14,20,17,.06);
    --radius: 14px;
    --container: 1200px;
    --pad: 28px;
  }
  [data-variant="pilote"] {
    --bg: #0A0F0D;
    --fg: #F2F4F2;
    --muted: rgba(242,244,242,.62);
    --line: rgba(242,244,242,.12);
    --card: #11181A;
    --shadow: 0 1px 0 rgba(255,255,255,.04) inset, 0 12px 40px rgba(0,0,0,.5);
  }
  [data-variant="workshop"] {
    --bg: #F4EFE6;
    --fg: #1A1612;
    --muted: rgba(26,22,18,.62);
    --line: rgba(26,22,18,.14);
    --card: #FBF7EE;
  }
  [data-density="compact"] { --pad: 18px; }
  [data-density="comfy"]   { --pad: 40px; }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    background: var(--bg); color: var(--fg);
    font-family: 'Geist', ui-sans-serif, system-ui, -apple-system, sans-serif;
    font-feature-settings: 'ss01', 'cv11';
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
    line-height: 1.5;
    transition: background-color .3s ease, color .3s ease;
  }
  a { color: inherit; text-decoration: none; }
  button { font-family: inherit; }
  ::selection { background: var(--accent); color: #fff; }

  .mono { font-family: 'Geist Mono', ui-monospace, monospace; }
  .serif { font-family: 'Instrument Serif', 'Times New Roman', serif; font-weight: 400; }

  .container { max-width: var(--container); margin: 0 auto; padding: 0 24px; }

  /* Reveal animations — blur + scale + slide */
  [data-anim="on"] .reveal {
    opacity: 0;
    transform: translateY(22px) scale(0.97);
    filter: blur(6px);
    transition: opacity .75s cubic-bezier(.16,1,.3,1),
                transform .75s cubic-bezier(.16,1,.3,1),
                filter .75s cubic-bezier(.16,1,.3,1);
  }
  [data-anim="on"] .reveal.in { opacity: 1; transform: none; filter: blur(0); }
  [data-anim="on"] .reveal-delay-1 { transition-delay: .08s; }
  [data-anim="on"] .reveal-delay-2 { transition-delay: .16s; }
  [data-anim="on"] .reveal-delay-3 { transition-delay: .25s; }
  [data-anim="on"] .reveal-delay-4 { transition-delay: .34s; }

  /* Animated gradient blobs */
  @keyframes blob1 {
    0%,100% { transform: translate(0,0) scale(1); }
    33% { transform: translate(40px,-40px) scale(1.08); }
    66% { transform: translate(-30px,25px) scale(0.94); }
  }
  @keyframes blob2 {
    0%,100% { transform: translate(0,0) scale(1); }
    40% { transform: translate(-50px,30px) scale(1.06); }
    70% { transform: translate(35px,-20px) scale(0.96); }
  }
  .blob {
    position: fixed; pointer-events: none; z-index: 0;
    border-radius: 50%; filter: blur(80px);
  }
  .blob-1 {
    width: 600px; height: 600px;
    top: -100px; right: -100px;
    background: radial-gradient(circle, color-mix(in oklab, var(--accent) 14%, transparent), transparent 70%);
    animation: blob1 12s ease-in-out infinite;
  }
  .blob-2 {
    width: 500px; height: 500px;
    bottom: 200px; left: -80px;
    background: radial-gradient(circle, color-mix(in oklab, var(--accent) 8%, transparent), transparent 70%);
    animation: blob2 16s ease-in-out infinite;
  }
  #app { position: relative; z-index: 1; }

  /* Shimmer on primary buttons */
  @keyframes btn-shimmer {
    0% { background-position: -300% 0; }
    100% { background-position: 300% 0; }
  }
  .btn-primary {
    position: relative; overflow: hidden;
  }
  .btn-primary::after {
    content: "";
    position: absolute; inset: 0;
    background: linear-gradient(105deg, transparent 40%, rgba(255,255,255,.2) 50%, transparent 60%);
    background-size: 300% 100%;
    animation: btn-shimmer 3.5s ease-in-out infinite;
    pointer-events: none;
  }

  /* Gradient text animation on .text-glow */
  @keyframes glow-shift {
    0%,100% { filter: drop-shadow(0 0 8px color-mix(in oklab, var(--accent) 60%, transparent)); }
    50% { filter: drop-shadow(0 0 20px color-mix(in oklab, var(--accent) 90%, transparent)); }
  }

  /* Card tilt — enhanced hover */
  .card-tilt {
    transition: transform .25s ease, box-shadow .25s ease, border-color .25s ease;
    transform-style: preserve-3d;
  }
  .card-tilt:hover {
    border-color: color-mix(in oklab, var(--accent) 35%, var(--line));
    box-shadow: 0 20px 60px rgba(0,0,0,.18), 0 0 0 1px color-mix(in oklab, var(--accent) 15%, transparent);
  }

  /* Scroll progress bar */
  #scroll-bar {
    position: fixed; top: 0; left: 0; height: 2px;
    background: var(--accent); z-index: 999;
    width: 0%; transition: width .1s linear;
    box-shadow: 0 0 8px color-mix(in oklab, var(--accent) 80%, transparent);
  }

  /* Counter number animation */
  .count-num {
    display: inline-block;
    transition: transform .3s ease;
  }

  /* Buttons */
  .btn {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 13px 18px; border-radius: 10px;
    font-weight: 500; font-size: 14.5px;
    border: 1px solid transparent; cursor: pointer;
    transition: transform .15s ease, background-color .2s ease, border-color .2s ease, box-shadow .2s ease;
    white-space: nowrap;
  }
  .btn-primary {
    background: var(--accent); color: #fff;
    box-shadow: 0 1px 0 rgba(255,255,255,.2) inset, 0 4px 14px color-mix(in oklab, var(--accent) 35%, transparent);
  }
  .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 1px 0 rgba(255,255,255,.2) inset, 0 8px 22px color-mix(in oklab, var(--accent) 45%, transparent); }
  .btn-ghost { background: transparent; color: var(--fg); border-color: var(--line); }
  .btn-ghost:hover { background: color-mix(in oklab, var(--fg) 5%, transparent); }
  .btn-dark { background: var(--fg); color: var(--bg); }
  .btn-dark:hover { transform: translateY(-1px); }

  /* Tags / chips */
  .chip {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 5px 10px; border-radius: 999px;
    font-family: 'Geist Mono', monospace; font-size: 11px; letter-spacing: .04em;
    background: color-mix(in oklab, var(--accent) 12%, transparent);
    color: var(--accent);
    border: 1px solid color-mix(in oklab, var(--accent) 22%, transparent);
  }
  .chip .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); animation: pulse 2s ease-in-out infinite; }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: .4; } }

  /* Headings */
  h1, h2, h3 { letter-spacing: -0.02em; line-height: 1.05; margin: 0; font-weight: 500; text-wrap: balance; }
  h1 { font-size: clamp(40px, 6.4vw, 84px); }
  h2 { font-size: clamp(32px, 4.4vw, 56px); }
  h3 { font-size: 19px; font-weight: 500; letter-spacing: -0.01em; line-height: 1.3; }
  p  { text-wrap: pretty; }

  /* Section meta */
  .eyebrow {
    font-family: 'Geist Mono', monospace; text-transform: uppercase;
    font-size: 11px; letter-spacing: .12em; color: var(--muted);
    display: inline-flex; align-items: center; gap: 10px;
  }
  .eyebrow::before {
    content: ""; width: 22px; height: 1px; background: currentColor; opacity: .6;
  }

  /* Card */
  .card {
    background: var(--card); border: 1px solid var(--line); border-radius: var(--radius);
    box-shadow: var(--shadow);
  }

  /* Pilote variant flourishes */
  [data-variant="pilote"] .btn-primary {
    box-shadow: 0 0 0 1px color-mix(in oklab, var(--accent) 40%, transparent),
                0 0 28px color-mix(in oklab, var(--accent) 35%, transparent);
  }
  [data-variant="pilote"] .chip {
    background: color-mix(in oklab, var(--accent) 14%, transparent);
    border-color: color-mix(in oklab, var(--accent) 35%, transparent);
  }
  [data-variant="pilote"] body { background-image:
    radial-gradient(1200px 600px at 80% -10%, color-mix(in oklab, var(--accent) 10%, transparent), transparent 60%),
    radial-gradient(900px 500px at -10% 30%, color-mix(in oklab, var(--accent) 6%, transparent), transparent 60%);
  }

  /* Workshop variant editorial */
  [data-variant="workshop"] h1, [data-variant="workshop"] h2 {
    font-family: 'Instrument Serif', serif; font-weight: 400;
    letter-spacing: -0.01em;
  }
  [data-variant="workshop"] h1 { font-size: clamp(48px, 8vw, 120px); line-height: 0.95; }

  /* Focus visible — keyboard navigation */
  :focus-visible {
    outline: 2px solid var(--accent);
    outline-offset: 3px;
    border-radius: 4px;
  }
  :focus:not(:focus-visible) { outline: none; }

  /* Hidden utility */
  .sr-only { position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden; clip: rect(0,0,0,0); white-space: nowrap; border: 0; }

  #app { min-height: 100vh; }

  /* Marquee for the trust bar */
  .marquee { overflow: hidden; mask-image: linear-gradient(90deg, transparent, #000 12%, #000 88%, transparent); }
  .marquee-track { display: flex; gap: 64px; width: max-content; animation: scroll 40s linear infinite; }
  [data-anim="off"] .marquee-track { animation: none; }
  @keyframes scroll { from { transform: translateX(0); } to { transform: translateX(-50%); } }

  /* Apply tweak font */
  body[data-font="geist"]  { font-family: 'Geist', ui-sans-serif, system-ui, sans-serif; }
  body[data-font="serif"]  { font-family: 'Instrument Serif', 'Times New Roman', serif; }
</style>
</head>

<script>
/* ── Scroll progress bar ── */
(function() {
  const bar = document.getElementById('scroll-bar');
  window.addEventListener('scroll', () => {
    const total = document.documentElement.scrollHeight - window.innerHeight;
    bar.style.width = (window.scrollY / total * 100) + '%';
  }, { passive: true });
})();

/* ── Counter animation ── */
function animateCounter(el, target, duration) {
  let start = null;
  const step = (ts) => {
    if (!start) start = ts;
    const progress = Math.min((ts - start) / duration, 1);
    const ease = 1 - Math.pow(1 - progress, 3);
    const cur = Math.round(ease * target);
    el.textContent = cur.toLocaleString('fr-FR');
    if (progress < 1) requestAnimationFrame(step);
  };
  requestAnimationFrame(step);
}
window._initCounters = function() {
  document.querySelectorAll('[data-count]').forEach(el => {
    if (el.dataset.counted) return;
    el.dataset.counted = '1';
    const target = parseInt(el.dataset.count, 10);
    const io = new IntersectionObserver(([e]) => {
      if (e.isIntersecting) { animateCounter(el, target, 1200); io.disconnect(); }
    }, { threshold: .5 });
    io.observe(el);
  });
};

/* ── 3D tilt on cards ── */
function addTilt(el) {
  el.addEventListener('mousemove', (e) => {
    const r = el.getBoundingClientRect();
    const x = (e.clientX - r.left) / r.width  - 0.5;
    const y = (e.clientY - r.top)  / r.height - 0.5;
    el.style.transform = `perspective(800px) rotateX(${-y*6}deg) rotateY(${x*6}deg) translateY(-3px)`;
  });
  el.addEventListener('mouseleave', () => {
    el.style.transform = '';
  });
}
window._initTilt = function() {
  document.querySelectorAll('.card-tilt').forEach(el => {
    if (el.dataset.tilt) return;
    el.dataset.tilt = '1';
    addTilt(el);
  });
};
</script>
